services:
  - type: web
    name: auditvision-saas
    runtime: python
    buildCommand: cd dashboard && npm install && npm run build && cd .. && pip install -r requirements.txt
    startCommand: gunicorn --chdir execution --bind 0.0.0.0:$PORT server:app
    envVars:
      - key: FLASK_PORT
        value: 5000
      - key: MISTRAL_API_KEY
        sync: false # User must set this in Render UI
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: EMAIL_DESTINATARIO
        sync: false
      - key: MAX_FILE_SIZE_MB
        value: 20
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: NODE_VERSION
        value: 20.0.0
