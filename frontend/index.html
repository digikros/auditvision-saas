<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Upload e processamento automático de facturas com OCR inteligente.">
    <title>FacturaOCR — Upload de Facturas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">

        <!-- Header -->
        <header class="header">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="32" height="32" rx="8" fill="url(#logo-grad)"/>
                    <path d="M10 16L14 20L22 12" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <defs>
                        <linearGradient id="logo-grad" x1="0" y1="0" x2="32" y2="32">
                            <stop stop-color="#3A3A3C"/>
                            <stop offset="1" stop-color="#636366"/>
                        </linearGradient>
                    </defs>
                </svg>
                <span class="logo-text">Factura<span class="logo-accent">OCR</span></span>
            </div>
            <p class="header-subtitle">Processamento inteligente de facturas</p>
        </header>

        <!-- Main Card -->
        <main class="main-card">
            <form id="uploadForm" novalidate>

                <!-- Drop Zone -->
                <div class="drop-zone" id="dropZone">
                    <div class="drop-zone-content">
                        <svg class="upload-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="8" y="12" width="48" height="40" rx="6" stroke="#8E8E93" stroke-width="2" fill="none"/>
                            <path d="M32 40V24" stroke="#8E8E93" stroke-width="2" stroke-linecap="round"/>
                            <path d="M26 30L32 24L38 30" stroke="#8E8E93" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <rect x="16" y="4" width="32" height="8" rx="4" fill="#E5E5EA"/>
                            <circle cx="24" cy="8" r="1.5" fill="#8E8E93"/>
                            <circle cx="32" cy="8" r="1.5" fill="#8E8E93"/>
                            <circle cx="40" cy="8" r="1.5" fill="#8E8E93"/>
                        </svg>
                        <h2 class="drop-zone-title">Arraste as facturas aqui</h2>
                        <p class="drop-zone-subtitle">ou clique para selecionar ficheiros</p>
                        <div class="drop-zone-formats">
                            <span class="format-tag">PDF</span>
                            <span class="format-tag">PNG</span>
                            <span class="format-tag">JPG</span>
                            <span class="format-tag">WEBP</span>
                        </div>
                        <p class="drop-zone-limit">Máximo 20MB por ficheiro</p>
                    </div>
                    <input
                        type="file"
                        id="fileInput"
                        name="files"
                        multiple
                        accept=".pdf,.png,.jpg,.jpeg,.webp,image/png,image/jpeg,image/webp,application/pdf"
                        class="file-input"
                    >
                </div>

                <!-- File List -->
                <div class="file-list" id="fileList" style="display: none;">
                    <div class="file-list-header">
                        <h3 class="file-list-title">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                <polyline points="14 2 14 8 20 8"/>
                            </svg>
                            Ficheiros selecionados
                        </h3>
                        <button type="button" class="clear-all-btn" id="clearAllBtn">Limpar tudo</button>
                    </div>
                    <ul class="file-items" id="fileItems"></ul>
                </div>

                <!-- Validation Errors -->
                <div class="validation-errors" id="validationErrors" style="display: none;"></div>

                <!-- Progress Bar -->
                <div class="progress-container" id="progressContainer" style="display: none;">
                    <div class="progress-header">
                        <span class="progress-label">A enviar facturas...</span>
                        <span class="progress-percent" id="progressPercent">0%</span>
                    </div>
                    <div class="progress-track">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="submit-btn" id="submitBtn" disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    Enviar Factura(s)
                </button>
            </form>

            <!-- Success Message -->
            <div class="success-message" id="successMessage" style="display: none;">
                <div class="success-icon-wrapper">
                    <svg class="success-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="24" cy="24" r="22" stroke="#34C759" stroke-width="3" fill="#34C75910"/>
                        <path d="M15 24L21 30L33 18" stroke="#34C759" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <p class="success-text" id="successText"></p>
            </div>

            <!-- Results -->
            <div class="results-container" id="resultsContainer" style="display: none;">
                <h3 class="results-title">Dados Extraídos</h3>
                <div class="results-grid" id="resultsGrid"></div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2026 FacturaOCR — Processamento inteligente de documentos</p>
        </footer>

    </div>

    <script src="script.js"></script>
</body>
</html>
